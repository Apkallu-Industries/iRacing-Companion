name: Build Desktop Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Build desktop installer
        working-directory: ./desktop
        run: npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: pitwall-desktop-installer
          path: desktop/dist-installer
